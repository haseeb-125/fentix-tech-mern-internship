<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 1 – Semantic HTML Layout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, serif;
      background: #f4f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    /* ── HEADER ── */
    header {
      background: #e8edf2;
      padding: 28px;
      text-align: center;
      border-radius: 4px;
    }

    /* ── NAV ── */
    nav {
      background: #e8edf2;
      padding: 20px;
      text-align: center;
      border-radius: 4px;
    }

    /* ── THREE-COLUMN WRAPPER ── */
    main {
      display: flex;
      gap: 10px;
      flex: 1;
    }

    /* ── LEFT SIDEBAR ── */
    aside#left-sidebar {
      background: #e8edf2;
      width: 220px;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── MAIN CONTENT AREA ── */
    section#content {
      background: #e8edf2;
      flex: 1;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    /* ── RIGHT SIDEBAR ── */
    aside#right-sidebar {
      background: #e8edf2;
      width: 220px;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      background: #e8edf2;
      padding: 20px;
      text-align: center;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <header>Header</header>

  <nav>Navigation Menu</nav>

  <main>
    <aside id="left-sidebar">Content</aside>
    <section id="content">Main Content</section>
    <aside id="right-sidebar">Content</aside>
  </main>

  <footer>Footer</footer>

</body>
</html>
